data:
  content_dir: debug_data/content # Thư mục chứa ảnh cấu trúc (ảnh gốc cần biến đổi)
  style_dir: debug_data/style     # Thư mục chứa ảnh phong cách (texture/màu sắc muốn học)
  image_size: 256
  batch_size: 2
  num_workers: 4
  val_split: 0.1

train:
  epochs: 150
  lr: 0.0001
  grad_clip: 1.0
  mixed_precision: true
  ema_decay: 0.9999
  log_every: 10
  save_every: 5
  checkpoint_dir: checkpoints
  seed: 42

loss_weights:
  noise: 1.0      # Trọng số cho hàm loss chính của DDPM
  style: 0.5      # Trọng số ép mô hình học phong cách (tăng mạnh vì gradient đã fix)
  content: 0.1    # Trọng số ép mô hình giữ lại cấu trúc ban đầu (tăng mạnh vì gradient đã fix)

early_stopping:
  patience: 20
  min_delta: 0.0001