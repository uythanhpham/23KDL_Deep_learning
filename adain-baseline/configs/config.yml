seed: 42

dataset:
  mode: real
  real_root_dir: /kaggle/input/adain-processed-data/data/processed
  debug_root_dir: debug_data
  split: train
  style_domain: anime
  image_size: 256
  augmentation:
    flip_prob: 0.5
    crop_scale: 1.1

train:
  batch_size: 4
  num_workers: 2
  epochs: 5
  lr: 0.0001
  lambda_style: 10.0
  save_dir: /kaggle/working/checkpoints
